<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carlos Malagón — Portfolio</title>
    <meta name="description"
        content="Interactive 3D portfolio experience by Carlos Malagón, Telecommunications Engineer.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        /* ==========================================
           DESIGN SYSTEM — Portfolio OS Landing
           Unified with Finder aesthetic
           ========================================== */

        :root {
            --bg-deep: #08080a;
            --dark-mac-bg: rgba(30, 30, 32, 0.88);
            --dark-mac-sidebar: rgba(38, 38, 40, 0.75);
            --dark-mac-text: #f5f5f7;
            --dark-mac-border: rgba(255, 255, 255, 0.08);
            --dark-mac-border-strong: rgba(255, 255, 255, 0.14);
            --text-secondary: rgba(255, 255, 255, 0.4);
            --text-tertiary: rgba(255, 255, 255, 0.2);
            --mac-accent: #007AFF;
            --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: none;
        }

        body {
            background: var(--bg-deep);
            font-family: var(--font-display);
            color: var(--dark-mac-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==========================================
           CUSTOM CURSOR — Minimal, matches scene crosshair
           ========================================== */

        #custom-cursor {
            position: fixed;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.25s ease,
                height 0.25s ease,
                background 0.25s ease,
                border 0.25s ease;
        }

        #custom-cursor.hover {
            width: 28px;
            height: 28px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* ==========================================
           THREE.JS CANVAS
           ========================================== */

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ==========================================
           HERO OVERLAY — Clean OS Name Reveal
           ========================================== */

        #hero-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        #hero-overlay.fade-out {
            opacity: 0;
        }

        /* Hero Name — Inter ultralight, wide tracking */
        #hero-name {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 200;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--dark-mac-text);
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            min-height: 1.2em;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            position: relative;
            will-change: opacity, filter;
            transition: opacity 0.4s ease, filter 0.4s ease;
        }

        .letter.revealed {
            opacity: 1;
            filter: blur(0);
        }

        .letter.scrambling {
            opacity: 0.4;
            color: var(--text-secondary);
        }

        .letter.space {
            width: 0.3em;
        }

        /* Decorative reveal line */
        .hero-line {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--text-secondary), transparent);
            margin: 24px auto 0;
            transition: width 1.5s var(--ease-out-expo);
        }

        .hero-line.visible {
            width: 100px;
        }

        /* Subtitle */
        #hero-subtitle {
            font-size: 0.72rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 16px;
            min-height: 1.3em;
            font-family: var(--font-mono);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #hero-subtitle.visible {
            opacity: 1;
        }

        /* ==========================================
           SKIP / CONTINUE HINT
           ========================================== */

        #skip-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            font-size: 0.68rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: var(--text-tertiary);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        #skip-hint.visible {
            opacity: 1;
        }

        .skip-chevron {
            font-size: 0.85rem;
            animation: bob-chevron 2s ease-in-out infinite;
        }

        @keyframes bob-chevron {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            50% {
                transform: translateY(3px);
                opacity: 0.8;
            }
        }

        /* ==========================================
           AUDIO TOGGLE
           ========================================== */

        #audio-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 50;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--dark-mac-border);
            background: rgba(18, 18, 22, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            transition: all 0.25s ease;
        }

        #audio-toggle:hover {
            border-color: var(--dark-mac-border-strong);
            color: var(--text-secondary);
        }

        #audio-toggle.active {
            color: var(--dark-mac-text);
            border-color: rgba(255, 255, 255, 0.15);
        }

        #audio-toggle .material-symbols-outlined {
            font-size: 16px;
        }

        /* ==========================================
           macOS WINDOW — Identical to Finder
           ========================================== */

        .mac-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 40px)) scale(0.94);
            width: min(680px, 90vw);
            min-height: 340px;
            background: var(--dark-mac-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--dark-mac-border-strong);
            border-radius: 12px;
            overflow: hidden;
            z-index: 20;

            /* Multi-layer shadow — identical to Finder */
            box-shadow:
                0 0 0 0.5px rgba(255, 255, 255, 0.05),
                0 2px 4px rgba(0, 0, 0, 0.04),
                0 8px 16px rgba(0, 0, 0, 0.12),
                0 24px 48px rgba(0, 0, 0, 0.24),
                0 48px 80px rgba(0, 0, 0, 0.16);

            /* Hidden initially */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease,
                transform 0.7s var(--ease-out-expo);
        }

        /* Inner top-edge highlight */
        .mac-window::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 5%,
                    rgba(255, 255, 255, 0.12) 30%,
                    rgba(255, 255, 255, 0.15) 50%,
                    rgba(255, 255, 255, 0.12) 70%,
                    transparent 95%);
            z-index: 10;
            border-radius: 12px 12px 0 0;
        }

        .mac-window.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
            transition: opacity 0.5s ease,
                transform 0.7s var(--spring);
        }

        /* Title Bar */
        .title-bar {
            height: 38px;
            min-height: 38px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            user-select: none;
            cursor: grab;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--dark-mac-border);
        }

        .title-bar:active {
            cursor: grabbing;
        }

        /* Traffic Lights */
        .window-controls {
            display: flex;
            gap: 8px;
            margin-right: 16px;
        }

        .control-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn::after {
            font-size: 8px;
            font-weight: 700;
            line-height: 1;
            opacity: 0;
            transition: opacity 0.15s ease;
            color: rgba(0, 0, 0, 0.55);
        }

        .window-controls:hover .control-btn::after {
            opacity: 1;
        }

        .close-btn {
            background: #FF5F56;
            box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.12);
        }

        .close-btn::after {
            content: '×';
            font-size: 10px;
            margin-top: -0.5px;
        }

        .minimize-btn {
            background: #FFBD2E;
            box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.12);
        }

        .minimize-btn::after {
            content: '−';
            font-size: 11px;
            margin-top: -1px;
        }

        .maximize-btn {
            background: #27C93F;
            box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.12);
        }

        .maximize-btn::after {
            content: '↗';
            font-size: 7px;
        }

        .window-title {
            flex-grow: 1;
            text-align: center;
            font-weight: 500;
            font-size: 0.82rem;
            color: var(--dark-mac-text);
            opacity: 0.55;
            letter-spacing: 0.01em;
        }

        /* Window Body */
        .window-body {
            padding: 28px 32px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* ==========================================
           BOOT SEQUENCE
           ========================================== */

        #boot-section {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #boot-section.complete {
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
            position: absolute;
        }

        #boot-log {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 300;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-height: 180px;
        }

        .boot-line {
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            line-height: 1.8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .boot-line.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .boot-timestamp {
            color: var(--text-tertiary);
            font-size: 0.62rem;
            flex-shrink: 0;
        }

        .boot-prefix {
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .boot-text {
            flex: 1;
        }

        .boot-text.typing::after {
            content: '█';
            animation: blink-cursor 0.6s step-end infinite;
            color: var(--text-secondary);
            font-size: 0.65em;
            margin-left: 1px;
        }

        @keyframes blink-cursor {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .boot-status {
            opacity: 0;
            color: rgba(52, 199, 89, 0.7);
            font-size: 0.72rem;
            transition: opacity 0.3s ease;
            flex-shrink: 0;
        }

        .boot-status.visible {
            opacity: 1;
        }

        /* Progress Bar */
        .boot-progress {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 1px;
            margin-top: 14px;
            overflow: visible;
            position: relative;
        }

        #boot-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--text-tertiary), var(--text-secondary));
            border-radius: 1px;
            transition: width 0.5s var(--ease-out-expo);
            position: relative;
        }

        #boot-progress-fill::after {
            content: '';
            position: absolute;
            right: -1px;
            top: -4px;
            width: 20px;
            height: 10px;
            background: radial-gradient(ellipse at right, rgba(255, 255, 255, 0.15), transparent);
            border-radius: 50%;
        }

        /* ==========================================
           READY STATE
           ========================================== */

        #ready-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.7s ease, transform 0.7s var(--ease-out-expo);
            padding: 24px 0;
        }

        #ready-state.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* SVG Checkmark */
        .ready-icon {
            position: relative;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkmark-svg {
            width: 48px;
            height: 48px;
            color: var(--text-secondary);
        }

        .checkmark-circle {
            stroke-dasharray: 151;
            stroke-dashoffset: 151;
        }

        #ready-state.visible .checkmark-circle {
            animation: draw-stroke 0.8s var(--ease-out-expo) forwards;
        }

        .checkmark-path {
            stroke-dasharray: 36;
            stroke-dashoffset: 36;
        }

        #ready-state.visible .checkmark-path {
            animation: draw-stroke 0.4s ease 0.5s forwards;
        }

        @keyframes draw-stroke {
            to {
                stroke-dashoffset: 0;
            }
        }

        .pulse-ring {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            opacity: 0;
        }

        #ready-state.visible .pulse-ring {
            animation: pulse-expand 1.5s var(--ease-out-expo) forwards;
        }

        #ready-state.visible .pulse-ring:nth-child(3) {
            animation-delay: 0.2s;
        }

        #ready-state.visible .pulse-ring:nth-child(4) {
            animation-delay: 0.4s;
        }

        @keyframes pulse-expand {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }

            100% {
                transform: translate(-50%, -50%) scale(2.5);
                opacity: 0;
            }
        }

        .ready-title {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.04em;
        }

        .ready-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 340px;
            font-weight: 300;
        }

        /* Launch Button — Circle with SVG icon */
        .launch-btn-wrapper {
            position: relative;
            display: inline-flex;
            margin-top: 10px;
        }

        .launch-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--dark-mac-border);
            color: var(--dark-mac-text);
            cursor: none;
            transition: all 0.35s var(--ease-out-expo);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .launch-btn:hover {
            transform: scale(1.06);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--dark-mac-border-strong);
        }

        .portfolio-icon-svg {
            width: 24px;
            height: 24px;
            color: var(--dark-mac-text);
            overflow: visible;
        }

        .cube-path {
            stroke-dasharray: 120;
            stroke-dashoffset: 120;
        }

        .cube-path.inner {
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
        }

        #ready-state.visible .cube-path.outer {
            animation: draw-stroke 1.2s var(--ease-out-expo) 1.5s forwards;
        }

        #ready-state.visible .cube-path.inner {
            animation: draw-stroke 1.2s var(--ease-out-expo) 1.8s forwards;
        }

        /* ==========================================
           VERSION TAG + LIVE CLOCK
           ========================================== */

        .version-area {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 50;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            font-weight: 300;
            color: var(--text-tertiary);
            letter-spacing: 0.08em;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        /* ==========================================
           TRANSITION OVERLAY
           ========================================== */

        #transition-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        #transition-overlay.active {
            opacity: 1;
        }

        /* ==========================================
           REDUCED MOTION
           ========================================== */

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }

            #hero-overlay {
                display: none;
            }

            .mac-window {
                opacity: 1;
                pointer-events: auto;
                transform: translate(-50%, -50%) scale(1);
            }

            #boot-section {
                display: none;
            }

            #ready-state {
                opacity: 1;
                transform: none;
            }

            .checkmark-circle,
            .checkmark-path {
                stroke-dashoffset: 0 !important;
            }
        }

        /* ==========================================
           RESPONSIVE
           ========================================== */

        @media (max-width: 640px) {
            .mac-window {
                width: 95vw;
                min-height: auto;
            }

            .window-body {
                padding: 20px 22px 24px;
            }

            #hero-name {
                letter-spacing: 0.15em;
            }

            #boot-log {
                font-size: 0.65rem;
            }

            .boot-timestamp {
                display: none;
            }

            .ready-title {
                font-size: 1.1rem;
            }

            html,
            body {
                cursor: auto;
            }

            #custom-cursor {
                display: none;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <!-- Custom Cursor -->
    <div id="custom-cursor"></div>

    <!-- Three.js Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Hero Overlay — Clean Name Reveal -->
    <div id="hero-overlay">
        <h1 id="hero-name">Carlos Malagón</h1>
        <div class="hero-line" id="hero-line"></div>
        <p id="hero-subtitle">Telecommunications Engineer</p>
    </div>

    <!-- Skip / Continue Hint -->
    <div id="skip-hint">
        <span>click to continue</span>
        <span class="skip-chevron">▾</span>
    </div>

    <!-- Audio Toggle -->
    <button id="audio-toggle" aria-label="Toggle audio">
        <span class="material-symbols-outlined">volume_off</span>
    </button>

    <!-- macOS Window — Boot Sequence -->
    <div class="mac-window" id="setup-window">
        <!-- Title Bar -->
        <div class="title-bar" id="title-bar">
            <div class="window-controls">
                <div class="control-btn close-btn"></div>
                <div class="control-btn minimize-btn"></div>
                <div class="control-btn maximize-btn"></div>
            </div>
            <div class="window-title">Sistema — Inicio</div>
        </div>

        <!-- Window Body -->
        <div class="window-body">
            <!-- Boot Sequence -->
            <div id="boot-section">
                <div id="boot-log"></div>
                <div class="boot-progress">
                    <div id="boot-progress-fill"></div>
                </div>
            </div>

            <!-- Ready State -->
            <div id="ready-state">
                <div class="ready-icon">
                    <svg class="checkmark-svg" viewBox="0 0 52 52">
                        <circle class="checkmark-circle" cx="26" cy="26" r="24" fill="none" stroke="currentColor"
                            stroke-width="1" />
                        <path class="checkmark-path" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round" d="M15 27l7 7 15-15" />
                    </svg>
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring"></div>
                </div>
                <h2 class="ready-title">Sistema Preparado</h2>
                <p class="ready-desc">
                    Tu experiencia inmersiva de portfolio 3D está lista para explorar.
                </p>
                <div class="launch-btn-wrapper">
                    <a href="scene.html" class="launch-btn" aria-label="Launch Experience">
                        <svg class="portfolio-icon-svg" viewBox="0 0 52 52">
                            <polygon class="cube-path outer" points="26,6 43.3,16 43.3,36 26,46 8.7,36 8.7,16"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
                            <path class="cube-path inner" d="M26,26 L26,6 M26,26 L43.3,36 M26,26 L8.7,36" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Version + Live Clock -->
    <div class="version-area">
        <span>v3.0</span>
        <span id="live-clock"></span>
    </div>

    <!-- Transition Overlay -->
    <div id="transition-overlay"></div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>

    <!-- Landing Engine -->
    <script type="module" src="./src/landing.js"></script>
</body>

</html>
